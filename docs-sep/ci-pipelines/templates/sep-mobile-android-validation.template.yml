# Template futuro: copiar para .github/workflows/mobile-android-validation.yml somente quando Android nativo for habilitado.
name: Mobile Android Validation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android-debug:
    name: Build Android debug
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build PWA and sync Android
        working-directory: .
        run: |
          npm ci
          npm run build
          npx cap sync android

      - name: Build Android debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: sep-mobile-android-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

