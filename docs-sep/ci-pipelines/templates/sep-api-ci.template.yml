# =============================================================================
# Template: CI do repositorio sep-api (backend Java + Spring Boot)
# =============================================================================
# Como usar:
#   1. Copie este arquivo para `.github/workflows/ci.yml` na raiz do repo `sep-api`
#   2. Remova o sufixo `.template` do nome
#   3. (Opcional) Ajuste java-version conforme convencao do repo
#
# Diferencas vs versao monorepo anterior:
#   - Sem path-filter por subpasta (cada repo so tem o backend Java)
#   - Postgres via service container (evita Testcontainers desnecessario na CI)
# =============================================================================

name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate backend
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sep
          POSTGRES_PASSWORD: sep
          POSTGRES_DB: sep_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate
        run: |
          chmod +x ./gradlew
          ./gradlew spotlessCheck build jacocoTestReport

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-report
          path: build/reports/jacoco/
          if-no-files-found: ignore
