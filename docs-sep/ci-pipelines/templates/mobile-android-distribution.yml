# Template futuro: copiar para .github/workflows/mobile-android-distribution.yml somente quando homologacao Android for autorizada.
name: Mobile Android Distribution

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android-release:
    name: Build signed Android release
    runs-on: ubuntu-24.04
    environment: mobile-android-homologacao

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Decode Android keystore
        working-directory: apps/sep-mobile
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app/keystore
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/keystore/release.jks

      - name: Build signed AAB
        working-directory: apps/sep-mobile
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          npm ci
          npm run build
          npx cap sync android
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=app/keystore/release.jks \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: sep-mobile-android-release-aab
          path: apps/sep-mobile/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

