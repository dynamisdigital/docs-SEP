# Template futuro: copiar para .github/workflows/aws-deploy-homologacao.yml somente apos aws-develop estar estavel.
name: AWS Deploy Homologacao

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy homologacao
    runs-on: ubuntu-24.04
    environment: homologacao

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || 'sa-east-1' }}

      - name: Deploy application
        run: |
          echo "::notice::Implement homologacao deploy only after migrations, seeds and rollback are validated in aws-develop."
          exit 1

