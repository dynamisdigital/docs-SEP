# Template futuro: copiar para .github/workflows/mobile-ios-testflight.yml somente quando TestFlight for autorizado.
name: Mobile iOS TestFlight

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  testflight:
    name: Publish to TestFlight
    runs-on: macos-15
    environment: mobile-ios-testflight

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build PWA and sync iOS
        working-directory: .
        run: |
          npm ci
          npm run build
          npx cap sync ios

      - name: Import signing assets
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "::notice::Import certificate and provisioning profile here before enabling this workflow."
          test -n "$IOS_CERTIFICATE_BASE64"
          test -n "$IOS_CERTIFICATE_PASSWORD"
          test -n "$IOS_PROVISIONING_PROFILE_BASE64"

      - name: Archive iOS app
        working-directory: .
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/SEP.xcarchive \
            archive

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          echo "::notice::Configure App Store Connect upload after signing export options are finalized."
          test -n "$APP_STORE_CONNECT_API_KEY_ID"
          test -n "$APP_STORE_CONNECT_ISSUER_ID"
          test -n "$APP_STORE_CONNECT_API_KEY"

