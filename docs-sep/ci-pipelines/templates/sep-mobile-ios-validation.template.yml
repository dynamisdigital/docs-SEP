# Template futuro: copiar para .github/workflows/mobile-ios-validation.yml somente quando iOS nativo for habilitado.
name: Mobile iOS Validation

on:
  pull_request:
    paths:
      - "apps/sep-mobile/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ios-build:
    name: Build iOS validation
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build PWA and sync iOS
        working-directory: apps/sep-mobile
        run: |
          npm ci
          npm run build
          npx cap sync ios

      - name: Build iOS app
        working-directory: apps/sep-mobile
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            build

