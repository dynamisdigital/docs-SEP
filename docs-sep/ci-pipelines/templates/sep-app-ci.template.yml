# =============================================================================
# Template: CI do repositorio sep-app (frontend Angular)
# =============================================================================
# Como usar:
#   1. Copie este arquivo para `.github/workflows/ci.yml` na raiz do repo `sep-app`
#   2. Remova o sufixo `.template` do nome
#   3. (Opcional) Ajuste node-version conforme convencao do repo
#
# Diferencas vs versao monorepo anterior:
#   - Sem path-filter por subpasta (cada repo so tem um app)
#   - Sem `working-directory` (workflow ja roda no root do repo)
# =============================================================================

name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate frontend web
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test -- --coverage

      - name: Build
        run: npm run build
