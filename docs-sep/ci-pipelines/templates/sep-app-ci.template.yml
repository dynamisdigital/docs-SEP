# =============================================================================
# Template: CI do repositorio sep-app (frontend Angular)
# =============================================================================
# Como usar:
#   1. Copie este arquivo para `.github/workflows/ci.yml` na raiz do repo `sep-app`
#   2. Remova o sufixo `.template` do nome
#   3. (Opcional) Ajuste node-version conforme convencao do repo
#
# Diferencas vs versao monorepo anterior:
#   - Sem path-filter por subpasta (cada repo so tem um app)
#   - Sem `working-directory` (workflow ja roda no root do repo)
# =============================================================================

name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
      - "feature/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test, Lint, Coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Format check
        run: npm run format:check

      - name: Lint TS/HTML
        run: npm run lint

      - name: Lint SCSS
        run: npm run lint:scss

      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: coverage/
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/
          retention-days: 14
